name: CI - Lint and Test

on:
  push:
    branches: [ "main", "staging", "najma_*" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies with uv
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          curl -LsSf https://astral.sh/uv/install.sh | sh && $HOME/.local/bin/uv pip install --system --no-cache -r backend/requirements.txt
          
      - name: Run linter
        working-directory: backend
        run: flake8 .
        
      - name: Run tests
        working-directory: backend
        run: pytest